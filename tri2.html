<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; form-action 'none'; frame-ancestors 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="style.css">
    <title>ContactUs</title>
</head>
<body>
    <section class="contact-section">
        <h1>Contact Us</h1>
        <p>If you have any questions or feedback, reach us here!</p>
        <form class="contact-form" onsubmit="return false;">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="tel" placeholder="Your Phone Number (optional)">
            <textarea placeholder="Your Message" required></textarea>
            <button type="button" onclick="alert('Thank you for reaching out! We will respond soon.');">Send Message</button>
        </form>
    </section>
</body>
</html>
